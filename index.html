      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

      :root {
        --background: #0d0d0e;
        --label-primary: #f5f5f5;
        --label-secondary: #ababab;
        --label-tertiary: #777777;
        --line-primary: #383838;
        --line-secondary: #222222;
        --mobile-line: #262626;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--label-primary);
        font-family:
          "Pretendard",
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
      }

      a,
      button {
        color: inherit;
        font: inherit;
      }

      a {
        text-decoration: none;
      }

      button {
        border: 0;
        background: transparent;
        cursor: pointer;
      }

      p,
      h2,
      ul {
        margin: 0;
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 160px;
        padding: 32px 40px 40px;
        background: var(--background);
      }

      .site-header {
        width: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        line-height: 1.2;
        white-space: nowrap;
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .profile-name {
        color: var(--label-primary);
        font-size: clamp(88px, 9.375vw, 120px);
        font-weight: 700;
        line-height: 1.2;
      }

      .profile-role {
        color: var(--label-secondary);
        font-size: 15px;
        font-weight: 400;
        line-height: 1.2;
      }

      .header-actions {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 20px;
      }

      .nav {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 30px;
        color: var(--label-secondary);
        font-size: 18px;
        font-weight: 400;
        line-height: 1.2;
      }

      .nav a[aria-current="page"] {
        color: var(--label-primary);
      }

      .header-separator {
        width: 1px;
        height: 8px;
        margin-top: 7px;
        background: var(--line-primary);
      }

      .language-toggle {
        padding: 0;
        color: var(--label-secondary);
        font-size: 18px;
        font-weight: 400;
        line-height: 1.2;
      }

      .sticky-header {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 20;
        width: 100%;
        padding: 18px 40px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        background: rgba(13, 13, 14, 0.88);
        backdrop-filter: blur(16px);
        color: var(--label-primary);
        line-height: 1.2;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-12px);
        transition:
          opacity 180ms ease,
          transform 180ms ease,
          visibility 180ms ease;
        visibility: hidden;
      }

      .has-sticky-header .sticky-header {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        visibility: visible;
      }

      .sticky-brand {
        display: flex;
        align-items: flex-start;
        gap: 4px;
        color: var(--label-primary);
        font-size: 18px;
        font-weight: 400;
        white-space: nowrap;
      }

      .sticky-brand span:nth-child(-n + 2) {
        color: var(--label-secondary);
      }

      .sticky-actions {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 20px;
        white-space: nowrap;
      }

      .sticky-about,
      .sticky-language-toggle {
        padding: 0;
        font-size: 18px;
        font-weight: 400;
        line-height: 1.2;
      }

      .sticky-about {
        color: var(--label-primary);
      }

      .sticky-language-toggle {
        color: var(--label-secondary);
      }

      .sticky-separator {
        width: 1px;
        height: 8px;
        margin-top: 7px;
        background: var(--line-primary);
      }

      .content {
        width: 100%;
        max-width: 800px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 120px;
      }

      .intro {
        width: 100%;
        min-height: 264px;
        color: var(--label-primary);
        font-size: 15px;
        font-weight: 400;
        line-height: 1.44;
        word-break: keep-all;
      }

      .external-link {
        color: inherit;
        text-decoration: none;
        text-underline-offset: 3px;
      }

      .external-link:hover,
      .external-link:focus-visible {
        text-decoration: underline;
      }

      .intro-link {
        font-weight: 700;
      }

      .experience {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      .site-footer {
        width: 100%;
        color: var(--label-tertiary);
        font-size: 13px;
        font-weight: 400;
        line-height: 1.4;
        text-align: center;
      }

      .experience-head {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        line-height: 1.4;
      }

      .section-title {
        flex: 1 1 0;
        min-width: 0;
        color: var(--label-primary);
        font-size: 16px;
        font-weight: 700;
      }

      .updated-at {
        flex: 0 0 auto;
        color: var(--label-tertiary);
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        white-space: nowrap;
      }

      .experience-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 44px;
      }

      .divider {
        width: 100%;
        height: 1px;
        flex: 0 0 auto;
        background: var(--line-secondary);
      }

      .divider:first-child {
        background: var(--line-primary);
      }

      .job {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 30px;
        padding-right: 40px;
        font-size: 15px;
        font-weight: 400;
      }

      .company {
        flex: 1 1 0;
        max-width: 240px;
        min-width: 0;
        line-height: 1.4;
        white-space: nowrap;
      }

      .company-name {
        color: var(--label-primary);
        font-size: 20px;
        font-weight: 400;
        line-height: 1.4;
      }

      .role-info {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        margin-top: 8px;
        color: var(--label-secondary);
        line-height: 1.4;
      }

      .job-details {
        flex: 1 1 0;
        min-width: 0;
        color: var(--label-primary);
      }

      .project-list {
        padding-left: 22.5px;
        color: var(--label-primary);
        font-size: 15px;
        font-weight: 400;
        line-height: 1.54;
      }

      .project-list li + li {
        margin-top: 16px;
      }

      .extra-projects {
        display: grid;
        grid-template-rows: 0fr;
        margin-top: 0;
        opacity: 0;
        overflow: hidden;
        transition:
          grid-template-rows 260ms ease,
          margin-top 260ms ease,
          opacity 180ms ease;
      }

      .extra-projects.is-open {
        grid-template-rows: 1fr;
        margin-top: 16px;
        opacity: 1;
      }

      .extra-projects-inner {
        min-height: 0;
        overflow: hidden;
      }

      .more {
        display: block;
        margin-top: 20px;
        padding: 0 0 0 20px;
        color: var(--label-secondary);
        font-size: 15px;
        font-weight: 400;
        line-height: 1.54;
        text-align: left;
        transition: color 160ms ease;
      }

      .more:hover,
      .more:focus-visible {
        color: var(--label-primary);
      }

      @media (prefers-reduced-motion: reduce) {
        .extra-projects,
        .more,
        .sticky-header {
          transition: none;
        }
      }

      @media (max-width: 800px) {
        .page {
          gap: clamp(96px, 15vw, 128px);
          padding: 28px clamp(20px, 5vw, 40px) 140px;
        }

        .profile-name {
          font-size: clamp(56px, 10vw, 78px);
        }

        .header-actions {
          gap: 16px;
        }

        .nav {
          gap: 24px;
        }

        .content {
          gap: clamp(88px, 14vw, 120px);
          max-width: 100%;
        }

        .intro {
          min-height: 240px;
        }

        .experience-list {
          gap: 40px;
        }

        .job {
          gap: 24px;
          padding-right: 0;
        }

        .company {
          max-width: 180px;
        }

        .company-name {
          font-size: 19px;
        }

        .job {

        .company {

        .project-list {

          font-size: 20px;
          line-height: 1.2;

        .experience {

        .experience-head {

        .section-title {

        .job {

        .company {

          line-height: 1.35;
        }

        .company-name {
          font-size: 17px;
          font-weight: 700;
          line-height: 1.35;
        }

        .role-info {

          color: #8f8f8f;
          font-size: 13px;
          line-height: 1.5;
        }

        .job-details {

        }

        .project-list {
          padding-left: 0;
          list-style-position: inside;
          font-size: 13px;
          line-height: 1.55;

          padding-top: 20px;
          border-top: 1px solid var(--mobile-line);

          font-size: 13px;
          line-height: 1.5;

          margin-top: 78px;
          font-size: 12px;
          line-height: 1.5;

            role: "Product Designer",
          },
          nav: {
            about: "About",
            works: "Works",
            language: "Korean",
          },
          intro: [
            "Hello.",
            "I’m Tayhoon Kim, a product designer.",
            "",
            "“I design what is visible and what is not.”",
            "",
            "I’m interested in design systems and UX/UI for AI services.",
            "I’m especially drawn to understanding the context behind user data and improving UX/UI based on it.",
            "",
            "I’m currently working at NC AI on VARCO 3D, a Text-to-3D AI generation service.",
            "",
            "You can find my experience below.",
            "Stay healthy and happy.",
          ],
          experience: {
            title: "Experience",
            updatedAt: "Last updated: 2026.06.01",
            more: "More projects",
            collapse: "Less",
            jobs: [
              {
                id: "nc-ai-current",
                company: "NC AI",
                role: "Product Designer",
                date: "2025.02 - Present",
                url: "nc-ai.com↗",
                summaryProjects: [
                  {
                    name: "VARCO 3D",
                    description:
                      "UX/UI design and operation for a generative AI product for 3D assets",
                  },
                  {
                    name: "VARCO Design System",
                    description:
                      "Built and operated the design system across NC AI services",
                  },
                ],
                extraProjects: [],
              },
              {
                id: "nc-ai-past",
                company: "NC",
                role: "Product Designer",
                date: "2022.06 - 2025.01",
                url: "nc.com↗",
                summaryProjects: [
                  {
                    name: "VARCO Text",
                    description:
                      "UX/UI design for a Text-to-Text AI service specialized for game production",
                  },
                  {
                    name: "AI Financial Service",
                    description:
                      "UX/UI design for an MTS app prototype powered by financial AI",
                  },
                ],
                extraProjects: [],
              },
              {
                id: "webzen",
                company: "Webzen",
                role: "UX/UI Designer",
                date: "2017.08 - 2022.05",
                url: "company.webzen.com↗",
                summaryProjects: [
                  {
                    name: "Webzen Community Site",
                    description:
                      "Built a mobile game community platform and improved UX",
                  },
                  {
                    name: "Shot Online EU Website Renewal",
                    description:
                      "UX/UI design for the Shot Online Europe website renewal",
                  },
                ],
                extraProjects: [
                  {
                    name: "Webzen Remote App",
                    description:
                      "UX/UI design for a mobile streaming app for desktop games",
                  },
                  {
                    name: "Southeast Asia Payment Platform",
                    description:
                      "UX/UI build for a payment platform targeting the Southeast Asian market",
                  },
                  {
                    name: "Game Guide Website",
                    description: "UX/UI design for Webzen game guide websites",
                  },
                  {
                    name: "Master Tanker Official Website",
                    description:
                      "Official website build for the mobile game Master Tanker",
                  },
                ],
              },
              {
                id: "media4th-one",
                company: "Media4th One",
                role: "UI Designer",
                date: "2014/09 - 2015.09",
                url: "media4thone.co.kr↗",
                summaryProjects: [
                  {
                    name: "SM Entertainment Website Proposal",
                    description:
                      "Solo UI design for a website renewal proposal",
                  },
                  {
                    name: "SM Entertainment Website Proposal and Build",
                    description: "Subpage design for the website build project",
                  },
                ],
                extraProjects: [
                  {
                    name: "Dragon Nest Website",
                    description: "UI design for brand website subpages",
                  },
                  {
                    name: "Renault Samsung Website Renewal Proposal",
                    description:
                      "Website renewal proposal and UI resource production",
                  },
                  {
                    name: "Paradise City Website",
                    description:
                      "UX/UI design for multilingual website and subpages",
                  },
                  {
                    name: "KT&G Website Accessibility Improvements",
                    description:
                      "Accessibility improvements for the English website based on WCAG 2.0",
                  },
                ],
              },
            ],
          },
        },
      };

      const allowedLangs = new Set(["ko", "en"]);
      const expandableJobIds = new Set(["webzen", "media4th-one"]);
      let expandedJobId = null;

      let currentLang = resolveInitialLang();

      const els = {
        metaDescription: document.querySelector('meta[name="description"]'),
        profileName: document.querySelector(".profile-name"),
        profileRole: document.querySelector(".profile-role"),
        nav: document.querySelector(".nav"),
        languageToggle: document.querySelector(".language-toggle"),
        stickyHeader: document.querySelector(".sticky-header"),
        stickyLanguageToggle: document.querySelector(".sticky-language-toggle"),
        intro: document.querySelector(".intro"),
        sectionTitle: document.querySelector(".section-title"),
        updatedAt: document.querySelector(".updated-at"),
        experienceList: document.querySelector(".experience-list"),
      };

      function resolveInitialLang() {
        const params = new URLSearchParams(window.location.search);
        const urlLang = params.get("lang");
        if (allowedLangs.has(urlLang)) {
          localStorage.setItem("lang", urlLang);
          return urlLang;
        }

        localStorage.setItem("lang", "en");
        return "en";
      }

      function syncLangUrl(lang) {
        const params = new URLSearchParams(window.location.search);
        params.set("lang", lang);
        const query = params.toString();
        const nextUrl = `${window.location.pathname}?${query}${window.location.hash}`;
        window.history.replaceState({}, "", nextUrl);
      }

      function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem("lang", lang);
        syncLangUrl(lang);
        render();
      }

      function createExternalLink(label, href, className = "") {
        const link = document.createElement("a");
        link.className = ["external-link", className].filter(Boolean).join(" ");
        link.href = href;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = label;
        return link;
      }

      const preferredEnglishUrls = {
        "company.webzen.com": "https://company.webzen.com/en",
        "nc-ai.com": "https://nc-ai.com/en",
        "nc.com": "https://www.nc.com/",
      };

      function createHrefFromDisplayUrl(displayUrl) {
        const cleanUrl = displayUrl.replace("↗", "").trim();
        if (preferredEnglishUrls[cleanUrl]) {
          return preferredEnglishUrls[cleanUrl];
        }
        if (/^https?:\/\//i.test(cleanUrl)) {
          return cleanUrl;
        }
        return `https://${cleanUrl}`;
      }

      function createTextParagraph(text) {
        const p = document.createElement("p");
        if (text) {
          const linkTarget = "VARCO 3D";
          const linkIndex = text.indexOf(linkTarget);
          if (linkIndex >= 0) {
            p.append(document.createTextNode(text.slice(0, linkIndex)));
            p.append(
              createExternalLink(
                `${linkTarget}↗`,
                "https://3d.varco.ai/explore",
                "intro-link",
              ),
            );
            p.append(
              document.createTextNode(
                text.slice(linkIndex + linkTarget.length),
              ),
            );
          } else {
            p.textContent = text;
          }
        } else {
          p.innerHTML = "&nbsp;";
        }
        return p;
      }

      function createProjectItem(project) {
        const li = document.createElement("li");
        li.append(document.createTextNode(project.name));
        li.append(document.createElement("br"));
        li.append(document.createTextNode(project.description));
        return li;
      }

      function getToggleLabel(job, labels, isExpanded) {
        return isExpanded
          ? labels.collapse
          : `${labels.more} (${job.extraProjects.length})`;
      }

      function renderNav(labels) {
        els.nav.replaceChildren();

        const about = document.createElement("a");
        about.href = "#about";
        about.setAttribute("aria-current", "page");
        about.textContent = labels.about;

        const works = document.createElement("a");
        works.href = "#experience";
        works.hidden = true;
        works.textContent = labels.works;

        els.nav.append(about, works);
      }

      function renderJob(job, labels) {
        const isExpandable =
          expandableJobIds.has(job.id) && job.extraProjects.length > 0;
        const isExpanded = expandedJobId === job.id;

        const article = document.createElement("article");
        article.className = "job";
        article.dataset.jobId = job.id;
        article.classList.toggle("is-expanded", isExpanded);

        const company = document.createElement("div");
        company.className = "company";

        const companyName = document.createElement("h2");
        companyName.className = "company-name";
        companyName.textContent = job.company;

        const roleInfo = document.createElement("div");
        roleInfo.className = "role-info";
        [job.role, job.date].forEach((value) => {
          const p = document.createElement("p");
          p.textContent = value;
          roleInfo.append(p);
        });

        const url = document.createElement("p");
        url.append(
          createExternalLink(job.url, createHrefFromDisplayUrl(job.url)),
        );
        roleInfo.append(url);

        company.append(companyName, roleInfo);

        const details = document.createElement("div");
        details.className = "job-details";

        const summaryList = document.createElement("ul");
        summaryList.className = "project-list summary-projects";
        job.summaryProjects.forEach((project) =>
          summaryList.append(createProjectItem(project)),
        );
        details.append(summaryList);

        if (isExpandable) {
          const extra = document.createElement("div");
          extra.className = "extra-projects";
          extra.id = `extra-projects-${job.id}`;
          extra.setAttribute("aria-hidden", String(!isExpanded));
          if (isExpanded) {
            extra.classList.add("is-open");
          }

          const extraInner = document.createElement("div");
          extraInner.className = "extra-projects-inner";

          const extraList = document.createElement("ul");
          extraList.className = "project-list extra-project-list";
          job.extraProjects.forEach((project) =>
            extraList.append(createProjectItem(project)),
          );

          extraInner.append(extraList);
          extra.append(extraInner);
          details.append(extra);

          const more = document.createElement("button");
          more.className = "more";
          more.type = "button";
          more.dataset.jobId = job.id;
          more.setAttribute("aria-expanded", String(isExpanded));
          more.setAttribute("aria-controls", extra.id);
          more.textContent = getToggleLabel(job, labels, isExpanded);
          details.append(more);
        }

        article.append(company, details);
        return article;
      }

      function renderExperience(data) {
        els.sectionTitle.textContent = data.experience.title;
        els.updatedAt.textContent = data.experience.updatedAt;
        els.experienceList.replaceChildren();

        data.experience.jobs.forEach((job, index) => {
          const divider = document.createElement("div");
          divider.className = "divider";
          divider.setAttribute("aria-hidden", "true");
          els.experienceList.append(divider, renderJob(job, data.experience));

          if (index === data.experience.jobs.length - 1) {
            return;
          }
        });
      }

      function findJobById(jobId) {
        return content[currentLang].experience.jobs.find(
          (job) => job.id === jobId,
        );
      }

      function setJobExpandedState(jobId, isExpanded) {
        const article = els.experienceList.querySelector(
          `.job[data-job-id="${jobId}"]`,
        );
        const job = findJobById(jobId);
        if (!article || !job) {
          return;
        }

        const extra = article.querySelector(".extra-projects");
        const button = article.querySelector(".more");
        article.classList.toggle("is-expanded", isExpanded);

        if (extra) {
          extra.classList.toggle("is-open", isExpanded);
          extra.setAttribute("aria-hidden", String(!isExpanded));
        }

        if (button) {
          button.setAttribute("aria-expanded", String(isExpanded));
          button.textContent = getToggleLabel(
            job,
            content[currentLang].experience,
            isExpanded,
          );
        }
      }

      function toggleJob(jobId) {
        const nextExpandedJobId = expandedJobId === jobId ? null : jobId;

        if (expandedJobId && expandedJobId !== jobId) {
          setJobExpandedState(expandedJobId, false);
        }

        setJobExpandedState(jobId, nextExpandedJobId === jobId);
        expandedJobId = nextExpandedJobId;
      }

      function render() {
        const data = content[currentLang];

        document.documentElement.lang = data.htmlLang;
        document.title = data.title;
        els.metaDescription.content = data.meta;
        els.profileName.textContent = data.profile.name;
        els.profileRole.textContent = data.profile.role;
        els.languageToggle.textContent = data.nav.language;
        els.stickyLanguageToggle.textContent = data.nav.language;
        els.languageToggle.setAttribute(
          "aria-label",
          currentLang === "ko" ? "Switch to English" : "Switch to Korean",
        );
        els.stickyLanguageToggle.setAttribute(
          "aria-label",
          currentLang === "ko" ? "Switch to English" : "Switch to Korean",
        );

        renderNav(data.nav);
        els.intro.replaceChildren(...data.intro.map(createTextParagraph));
        renderExperience(data);
      }

      function updateStickyHeader() {
        const isScrolled = window.scrollY > 24;
        document.body.classList.toggle("has-sticky-header", isScrolled);
        els.stickyHeader.setAttribute("aria-hidden", String(!isScrolled));
      }

      function scrollToAbout(event) {
        event.preventDefault();
        const targetY =
          els.intro.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({
          top: Math.max(0, targetY),
          behavior: "smooth",
        });
      }

      els.languageToggle.addEventListener("click", () => {
        setLanguage(currentLang === "ko" ? "en" : "ko");
      });

      els.stickyLanguageToggle.addEventListener("click", () => {
        setLanguage(currentLang === "ko" ? "en" : "ko");
      });

      els.nav.addEventListener("click", (event) => {
        const link = event.target.closest('a[href="#about"]');
        if (link) {
          scrollToAbout(event);
        }
      });

      document
        .querySelector(".sticky-about")
        .addEventListener("click", scrollToAbout);

      els.experienceList.addEventListener("click", (event) => {
        const button = event.target.closest(".more");
        if (!button) {
          return;
        }

        toggleJob(button.dataset.jobId);
      });

      window.addEventListener("popstate", () => {
        currentLang = resolveInitialLang();
        render();
      });

      window.addEventListener("scroll", updateStickyHeader, { passive: true });

      syncLangUrl(currentLang);
      render();
      updateStickyHeader();
    </script>
  </body>
</html>
